name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write       # create / edit releases
  id-token: write       # OIDC token for Sigstore
  attestations: write   # write build-provenance attestations

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16+ (SwiftUI View is @MainActor-isolated only in the 16 SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build .app
        run: ./scripts/build.sh

      - name: Zip (codesign-preserving)
        run: ditto -c -k --keepParent vol-mixer.app vol-mixer.app.zip

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: vol-mixer.app.zip

      - name: SHA256
        id: sha
        run: echo "sha=$(shasum -a 256 vol-mixer.app.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          gh release create "$TAG" vol-mixer.app.zip --title "$TAG" --generate-notes
          gh release view "$TAG" --json body --jq .body > /tmp/notes.md
          {
            echo ""
            echo "---"
            echo ""
            echo "**SHA256:** \`$SHA\`"
            echo ""
            echo "**Verify provenance** (proves this binary was built from this repo at this commit):"
            echo '```sh'
            echo "gh attestation verify vol-mixer.app.zip --repo $REPO"
            echo '```'
          } >> /tmp/notes.md
          gh release edit "$TAG" --notes-file /tmp/notes.md
