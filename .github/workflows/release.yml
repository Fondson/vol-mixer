name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write       # create / edit releases
  id-token: write       # OIDC token for Sigstore
  attestations: write   # write build-provenance attestations

env:
  # GitHub normalises spaces in release-asset names to dots. Zip with the
  # dotted name up-front so the upload URL matches what consumers download.
  ASSET: Volume.Mixer.app.zip
  BUNDLE: Volume Mixer.app

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16+ (SwiftUI View is @MainActor-isolated only in the 16 SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Optional: import a stable self-signed cert (CN must be vol-mixer-dev, so
      # build.sh finds it) so the Audio Capture grant survives updates. Without
      # the secret, the build falls back to ad-hoc signing.
      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          [ -n "$CERT_P12" ] || { echo "no SIGNING_CERT_P12 — ad-hoc signing"; exit 0; }
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

      - name: Build .app
        run: ./scripts/build.sh

      - name: Zip (codesign-preserving)
        run: ditto -c -k --keepParent "$BUNDLE" "$ASSET"

      # Detached Ed25519 signature the in-app updater checks before installing.
      # Without the secret no .sig is published and auto-update stays inert.
      - name: Sign update
        env:
          UPDATE_PRIVATE_KEY: ${{ secrets.UPDATE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          [ -n "$UPDATE_PRIVATE_KEY" ] || { echo "no UPDATE_PRIVATE_KEY — skipping"; exit 0; }
          ./scripts/sign-update.swift "$ASSET"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ASSET }}

      - name: SHA256
        id: sha
        run: echo "sha=$(shasum -a 256 "$ASSET" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          ASSETS="$ASSET"; [ -f "$ASSET.sig" ] && ASSETS="$ASSET $ASSET.sig"
          # A rerun after a partial failure uploads to the existing release
          # instead of failing because the release already exists.
          gh release create "$TAG" $ASSETS --title "$TAG" --generate-notes \
            || for f in $ASSETS; do gh release upload "$TAG" "$f" --clobber; done
          gh release view "$TAG" --json body --jq .body > /tmp/notes.md
          {
            echo ""
            echo "---"
            echo ""
            echo "**SHA256:** \`$SHA\`"
            echo ""
            echo "**Verify provenance** (proves this binary was built from this repo at this commit):"
            echo '```sh'
            echo "gh attestation verify \"$ASSET\" --repo $REPO"
            echo '```'
          } >> /tmp/notes.md
          gh release edit "$TAG" --notes-file /tmp/notes.md
